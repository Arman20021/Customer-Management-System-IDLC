name: cms
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
      MSSQL_SA_PASSWORD: "${MSSQL_SA_PASSWORD:-Arm@n789}"
    ports:
      - "${SQL_HOST_PORT:-14330}:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          /opt/mssql-tools18/bin/sqlcmd
          -S localhost
          -U sa
          -P "$$MSSQL_SA_PASSWORD"
          -C
          -Q "SELECT 1"
          -b
          -o /dev/null
          || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    restart: unless-stopped

  cms-api:
    image: arman20022/cms-api:1.0.0
    build:
      context: .
      dockerfile: Dockerfile
      args:
        BUILD_CONFIGURATION: Release
    environment:
      ASPNETCORE_ENVIRONMENT: Docker
      ASPNETCORE_HTTP_PORTS: "8080"
      ConnectionStrings__DefaultConnection: >-
        Server=sqlserver,1433;
        Database=CMSdb;
        User Id=sa;
        Password=${MSSQL_SA_PASSWORD:-Arm@n789};
        Encrypt=True;
        TrustServerCertificate=True;
        MultipleActiveResultSets=True;
    ports:
      - "${API_HOST_PORT:-8080}:8080"
    volumes:
      - uploads-data:/app/Uploads
    depends_on:
      sqlserver:
        condition: service_healthy
        restart: true
    restart: unless-stopped

volumes:
  sqlserver_data:
  uploads-data: